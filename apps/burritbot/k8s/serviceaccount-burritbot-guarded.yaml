# ABOUTME: ServiceAccount for guarded BurritBot — bound via WIF to the workload GSA.
# ABOUTME: GSA email is a placeholder; replace before terraform-managed deploy.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: burritbot
  namespace: burritbot-guarded
  labels:
    app.kubernetes.io/name: burritbot
    app.kubernetes.io/part-of: burritbot
    burritbot.io/layer: application
    burritbot.io/guarded: "true"
  annotations:
    iam.gke.io/gcp-service-account: burritbot-workload@kk-community-projects.iam.gserviceaccount.com
automountServiceAccountToken: true
