# ABOUTME: ClusterSecretStore connecting ESO to GCP Secret Manager via Workload Identity.
# ABOUTME: The ESO controller SA in external-secrets ns must be WIF-bound to a GSA with secretAccessor.
---
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: gcp-secret-manager
  labels:
    burritbot.io/layer: the-web
    app.kubernetes.io/part-of: burritbot
spec:
  provider:
    gcpsm:
      projectID: kk-community-projects
      auth:
        workloadIdentity:
          clusterLocation: us-west1
          clusterName: burritbot
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
