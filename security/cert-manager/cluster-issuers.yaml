# ABOUTME: Let's Encrypt ClusterIssuers for TLS certificate issuance on GKE.
# ABOUTME: HTTP-01 challenge solver uses the GCE ingress class; replace email before applying.
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
  labels:
    burritbot.io/layer: the-web
    app.kubernetes.io/part-of: burritbot
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: michael@kodekloud.com
    privateKeySecretRef:
      name: letsencrypt-staging-key
    solvers:
      - http01:
          ingress:
            ingressClassName: gce
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-production
  labels:
    burritbot.io/layer: the-web
    app.kubernetes.io/part-of: burritbot
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: michael@kodekloud.com
    privateKeySecretRef:
      name: letsencrypt-production-key
    solvers:
      - http01:
          ingress:
            ingressClassName: gce
