# ABOUTME: ConfigMap wrapping the the-eyes-overview.json dashboard for Grafana sidecar import.
# ABOUTME: Phase B3 enables the kube-prometheus-stack Grafana sidecar with selector grafana_dashboard=1.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-the-eyes-overview
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
    app.kubernetes.io/part-of: burritbot
    burritbot.io/layer: the-eyes
data:
  the-eyes-overview.json: |
    {
      "title": "The Eyes — Overview",
      "uid": "burritbot-the-eyes-overview",
      "description": "Top-level health dashboard for the burritbot observability layer. Shows OTel Collector ingest rate, gen_ai.* attribute coverage, and spinybacked-orbweaver conformance score.",
      "tags": ["burritbot", "the-eyes", "overview"],
      "schemaVersion": 38,
      "version": 1,
      "refresh": "15s",
      "time": {
        "from": "now-30m",
        "to": "now"
      },
      "panels": [
        {
          "id": 1,
          "type": "stat",
          "title": "OTel Collector — spans/sec",
          "targets": [
            {
              "expr": "sum(rate(burritbot_otelcol_receiver_accepted_spans[1m]))",
              "refId": "A"
            }
          ],
          "gridPos": {"h": 6, "w": 8, "x": 0, "y": 0}
        },
        {
          "id": 2,
          "type": "stat",
          "title": "gen_ai.* coverage (%)",
          "targets": [
            {
              "expr": "avg(burritbot_genai_attribute_coverage_ratio) * 100",
              "refId": "A"
            }
          ],
          "gridPos": {"h": 6, "w": 8, "x": 8, "y": 0}
        },
        {
          "id": 3,
          "type": "gauge",
          "title": "Orbweaver conformance score",
          "targets": [
            {
              "expr": "burritbot_orbweaver_conformance_score",
              "refId": "A"
            }
          ],
          "gridPos": {"h": 6, "w": 8, "x": 16, "y": 0}
        }
      ],
      "templating": {"list": []},
      "annotations": {"list": []}
    }
