# ABOUTME: ArgoCD Application for External Secrets Operator — syncs from GCP Secret Manager.
# ABOUTME: Adapted from kubeauto-ai-day (EKS IRSA) to GKE Workload Identity Federation.
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets
  namespace: argocd
  annotations:
    # Wave -4: ESO must be live before any ExternalSecret can reconcile.
    argocd.argoproj.io/sync-wave: "-4"
  labels:
    burritbot.io/layer: the-web
    app.kubernetes.io/part-of: burritbot
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    chart: external-secrets
    repoURL: https://charts.external-secrets.io
    targetRevision: "1.3.2"
    helm:
      valuesObject:
        serviceAccount:
          create: true
          name: external-secrets
          annotations:
            # WIF: the named GSA must have roles/secretmanager.secretAccessor on
            # the secrets ESO needs to read. The GSA email is a placeholder —
            # replace before applying.
            iam.gke.io/gcp-service-account: eso-controller@kk-community-projects.iam.gserviceaccount.com
        installCRDs: true
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
