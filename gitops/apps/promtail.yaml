# ABOUTME: ArgoCD Application for Promtail — log shipper from pods to Loki, runs as DaemonSet.
# ABOUTME: Adapted from kubeauto-ai-day; no AWS-specific config — chart is cloud-agnostic.
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: promtail
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "4"
  labels:
    burritbot.io/layer: the-eyes
    app.kubernetes.io/part-of: burritbot
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    chart: promtail
    repoURL: https://grafana.github.io/helm-charts
    targetRevision: "6.16.6"
    helm:
      valuesObject:
        config:
          clients:
            - url: http://loki.monitoring.svc.cluster.local:3100/loki/api/v1/push
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
