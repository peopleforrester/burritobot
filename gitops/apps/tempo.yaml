# ABOUTME: ArgoCD Application for Grafana Tempo — distributed tracing backend (local storage).
# ABOUTME: Adapted from kubeauto-ai-day; GKE 'standard' storage class swapped in for gp2.
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tempo
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
  labels:
    burritbot.io/layer: the-eyes
    app.kubernetes.io/part-of: burritbot
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    chart: tempo
    repoURL: https://grafana.github.io/helm-charts
    targetRevision: "1.18.1"
    helm:
      valuesObject:
        tempo:
          receivers:
            otlp:
              protocols:
                grpc:
                  endpoint: "0.0.0.0:4317"
                http:
                  endpoint: "0.0.0.0:4318"
          storage:
            trace:
              backend: local
              local:
                path: /var/tempo/traces
              wal:
                path: /var/tempo/wal
          retention: 24h
        persistence:
          enabled: true
          size: 5Gi
          # GKE default StorageClass (was AWS gp2 in the EKS reference).
          storageClassName: standard
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
